services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000 # should be owner of volumes
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
     ND_SCANINTERVAL: 1h
     ND_BASEURL: https://URL.com
     ND_LOGLEVEL: debug
    volumes:
      - "./data:/data"
      - "./music:/music"